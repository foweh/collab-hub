<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>协作创作工作室</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ─── 主界面 ─── -->
  <div id="app">
    <!-- 顶栏 -->
    <header id="topbar">
      <div class="topbar-left">
        <span class="app-title">🎬 创作工作室</span>
        <span class="badge" id="self-badge">👤 我</span>
        <span class="badge" id="online-badge" style="display:none"></span>
        <span class="badge" id="peer-badge" style="display:none"></span>
      </div>
      <div class="topbar-right">
        <div class="lan-toggle">
          <label class="switch">
            <input type="checkbox" id="lan-toggle-cb">
            <span class="slider"></span>
          </label>
          <span id="lan-status">🔴 局域网: 关闭</span>
        </div>
        <button class="toolbar-btn" id="refresh-lan-btn" title="刷新发现">🔄 <span data-i18n="refreshLan">搜索设备</span></button>
        <button class="toolbar-btn" id="lang-toggle-btn" title="中/EN" style="font-size:13px">🇨🇳 中文</button>
        <button class="toolbar-btn" id="admin-login-btn" title="管理员登录" style="font-size:13px;padding:5px 8px">👑</button>
      </div>
    </header>

    <!-- 导航 + 主体 -->
    <div id="main-layout">
      <!-- 左侧导航 -->
      <nav id="left-nav">
        <button class="nav-btn active" data-module="projects" title="我的项目">
          <span class="nav-icon">📂</span>
          <span class="nav-label">项目</span>
        </button>
        <button class="nav-btn" data-module="script" title="剧本编辑">
          <span class="nav-icon">📜</span>
          <span class="nav-label">剧本</span>
        </button>
        <button class="nav-btn" data-module="mindmap" title="思维导图">
          <span class="nav-icon">🧠</span>
          <span class="nav-label">导图</span>
        </button>
        <button class="nav-btn" data-module="story" title="故事写作">
          <span class="nav-icon">📖</span>
          <span class="nav-label">故事</span>
        </button>

        <button class="nav-btn" id="nav-storyboard" title="手绘分镜">
          <span class="nav-icon">🎬</span>
          <span class="nav-label">分镜</span>
        </button>
        <button class="nav-btn" data-module="devices" title="设备管理">
          <span class="nav-icon">💻</span>
          <span class="nav-label">设备</span>
        </button>
        <button class="nav-btn" data-module="activity" title="操作日志">
          <span class="nav-icon">📋</span>
          <span class="nav-label">日志</span>
        </button>
        <div class="nav-spacer"></div>
        <button class="nav-btn" id="help-btn" title="帮助">
          <span class="nav-icon">❓</span>
          <span class="nav-label">帮助</span>
        </button>
      </nav>

      <!-- 内容区 -->
      <main id="content-area">
        <!-- 项目面板 -->
        <section id="panel-projects" class="module-panel active">
          <div class="panel-header">
            <h2>📂 我的项目</h2>
            <div class="panel-actions">
              <button class="toolbar-btn primary" id="new-shooting-plan-btn">📋 拍摄计划</button>
              <button class="toolbar-btn" id="new-folder-btn">📁 文件夹</button>
              <button class="toolbar-btn" id="new-script-btn">+ 剧本</button>
              <button class="toolbar-btn" id="new-mindmap-btn">+ 思维导图</button>
              <button class="toolbar-btn" id="new-story-btn">+ 故事</button>
            </div>
          </div>
          <div id="project-list" class="project-grid"></div>
        </section>

        <!-- 剧本面板 -->
        <section id="panel-script" class="module-panel">
          <div class="panel-header">
            <h2 id="script-title">📜 剧本编辑器</h2>
            <div class="panel-actions">
              <button class="toolbar-btn" id="script-add-act">+ 幕</button>
              <button class="toolbar-btn" id="script-back">← 返回项目</button>
            </div>
          </div>
          <div id="script-editor" class="module-body">
            <div class="editor-placeholder">请选择或创建一个剧本项目</div>
          </div>
        </section>

        <!-- 思维导图面板 -->
        <section id="panel-mindmap" class="module-panel">
          <div class="panel-header">
            <h2 id="mindmap-title">🧠 思维导图</h2>
            <div class="panel-actions">
              <button class="toolbar-btn" id="mindmap-add-node">+ 节点</button>
              <button class="toolbar-btn" id="mindmap-back">← 返回项目</button>
            </div>
          </div>
          <div id="mindmap-editor" class="module-body">
            <canvas id="mindmap-canvas"></canvas>
            <div id="mindmap-toolbar">
              <button class="tool-btn" id="mm-undo" title="撤销 Ctrl+Z">↩ 撤销</button>
              <button class="tool-btn" id="mm-redo" title="重做 Ctrl+Shift+Z">↪ 重做</button>
              <span style="color:var(--border);width:1px;background:var(--border);margin:0 4px;display:inline-block;height:24px"></span>
              <button class="tool-btn" id="mm-add-root">➕ 根节点</button>
              <button class="tool-btn" id="mm-add-child">👶 子节点</button>
              <button class="tool-btn" id="mm-add-sibling">↔️ 同级节点</button>
              <button class="tool-btn" id="mm-collapse-toggle" title="折叠/展开子树">📂 折叠</button>
              <button class="tool-btn danger" id="mm-delete-node">🗑️ 删除选中</button>
              <input type="color" id="mm-color" value="#4fc3f7" title="节点颜色">
              <span style="color:var(--text-dim);font-size:12px;margin-left:auto" id="mm-node-count"></span>
            </div>
          </div>
        </section>

        <!-- 故事面板 -->
        <section id="panel-story" class="module-panel">
          <div class="panel-header">
            <h2 id="story-title">📖 故事编辑器</h2>
            <div class="panel-actions">
              <button class="toolbar-btn" id="story-add-chapter">+ 章节</button>
              <button class="toolbar-btn" id="story-back">← 返回项目</button>
            </div>
          </div>
          <div id="story-editor" class="module-body">
            <div id="story-layout">
              <aside id="story-chapter-list"></aside>
              <div id="story-content">
                <textarea id="story-textarea" placeholder="在这里写故事...&#10;&#10;支持多段落、对白、描写..." rows="20"></textarea>
              </div>
            </div>
          </div>
        </section>

        <!-- 分镜面板 -->
        <section id="panel-storyboard" class="module-panel">
          <div class="panel-header">
            <h2>🎬 分镜工具</h2>
            <div class="panel-actions">
              <button class="toolbar-btn" id="sb-back">← 返回项目</button>
            </div>
          </div>
          <div id="storyboard-frame" class="module-body" style="padding:0">
            <iframe src="/fenjing/index.html" style="width:100%;height:100%;border:none;background:#0f0f1a"></iframe>
          </div>
        </section>

        <!-- 设备面板 -->
        <section id="panel-devices" class="module-panel">
          <div class="panel-header">
            <h2>💻 设备管理</h2>
          </div>
          <div id="device-list" class="device-grid"></div>
        </section>

        <!-- 活动日志 -->
        <section id="panel-activity" class="module-panel">
          <div class="panel-header">
            <h2>📋 操作日志</h2>
            <div class="panel-actions">
              <button class="toolbar-btn" id="log-clear-btn">🗑️ 清空</button>
            </div>
          </div>
          <div id="activity-log" class="module-body"></div>
        </section>
      </main>

      <!-- 右侧面板 -->
      <aside id="right-sidebar">
        <!-- 对方信息 -->
        <section id="peer-section">
          <h3>🤝 协作对象</h3>
          <div id="peer-status-area" class="status-card">
            <div class="status-none">🔄 等待发现设备…<br><small>双方都打开"开启局域网"</small></div>
          </div>
        </section>

        <!-- 发送项目 -->
        <section id="transfer-section" style="display:none">
          <h3>📤 发送项目给对方</h3>
          <div id="transfer-list"></div>
          <button class="toolbar-btn" id="transfer-btn" disabled>发送选中项目</button>
        </section>

        <!-- 对方备注 -->
        <section id="note-section" style="display:none">
          <h3>📝 对方备注</h3>
          <textarea id="peer-note-input" placeholder="给对方写个备注..." rows="2"></textarea>
          <button class="toolbar-btn" id="peer-note-save">保存备注</button>
        </section>

        <!-- 在线用户 -->
        <section id="online-users-section">
          <h3>👥 在线人员 <span id="online-count" style="color:var(--accent);font-weight:600"></span></h3>
          <div id="online-users-area" class="status-card">
            <div class="status-none">⏳ 等待其他人加入…</div>
          </div>
        </section>

        <!-- 联系管理员（普通用户专用） -->
        <section id="contact-admin-section">
          <h3>📨 联系管理员</h3>
          <div style="display:flex;gap:4px">
            <input type="text" id="contact-admin-input" placeholder="输入消息..." maxlength="200" style="flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:12px;outline:none">
            <button id="contact-admin-btn" style="padding:5px 10px;border:none;border-radius:6px;background:var(--accent);color:#000;font-weight:600;cursor:pointer;font-size:12px;white-space:nowrap">发送</button>
          </div>
        </section>

        <!-- 管理面板（仅管理员可见） -->
        <section id="admin-panel" style="display:none">
          <h3>👑 管理面板
            <button id="admin-refresh-btn" style="float:right;padding:1px 6px;font-size:11px;border:1px solid var(--border);border-radius:3px;background:var(--surface2);color:var(--text);cursor:pointer">刷新</button>
          </h3>
          <!-- 管理员收件箱 -->
          <div id="admin-inbox" style="margin-bottom:8px">
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">📥 用户消息</div>
            <div id="admin-msgs" style="max-height:100px;overflow-y:auto;background:var(--surface2);border-radius:4px;padding:4px 6px;font-size:12px"></div>
          </div>
          <!-- 用户管理 -->
          <div style="max-height:160px;overflow-y:auto;font-size:12px">
            <table style="width:100%;border-collapse:collapse">
              <thead><tr style="color:var(--text-dim);font-size:11px">
                <th style="text-align:left;padding:2px 4px">用户</th>
                <th style="text-align:left;padding:2px 4px">状态</th>
                <th style="text-align:left;padding:2px 4px">指纹</th>
                <th style="text-align:left;padding:2px 4px">改密码</th>
                <th style="text-align:left;padding:2px 4px">操作</th>
              </tr></thead>
              <tbody id="admin-users-tbody"></tbody>
            </table>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <!-- 接收项目弹窗 -->
  <div id="receive-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <h3>📥 收到项目</h3>
      <p id="receive-info"></p>
      <div id="receive-list"></div>
      <button class="toolbar-btn" id="receive-ok">知道了</button>
    </div>
  </div>

  <!-- ─── 自定义 alert 弹窗 ─── -->
  <div id="alert-modal" class="modal-overlay" style="display:none">
    <div class="alert-card">
      <div class="alert-icon" id="alert-icon">ℹ️</div>
      <div class="alert-title" id="alert-title">提示</div>
      <div class="alert-text" id="alert-text"></div>
      <button class="alert-btn" id="alert-ok">知道了</button>
    </div>
  </div>

  <!-- ─── 自定义 confirm 弹窗 ─── -->
  <div id="confirm-modal" class="modal-overlay" style="display:none">
    <div class="alert-card">
      <div class="alert-icon" id="confirm-icon">❓</div>
      <div class="alert-title" id="confirm-title">确认操作</div>
      <div class="alert-text" id="confirm-text"></div>
      <div class="confirm-actions">
        <button class="confirm-btn cancel" id="confirm-cancel">取消</button>
        <button class="confirm-btn ok" id="confirm-ok">确认</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
  <script src="/script-editor.js"></script>
  <script src="/mindmap.js"></script>
  <script src="/story-editor.js"></script>
  <script src="/devices.js"></script>
</body>
</html>
