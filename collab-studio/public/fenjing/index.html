<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="分镜 — 影视前期策划工具" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✧</text></svg>" />
    <title>分镜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/fenjing/assets/index-DSxpk27Y.js"></script>
    <link rel="stylesheet" crossorigin href="/fenjing/assets/index-XptjBxIK.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>.header-tabs{display:none!important}
.draw-panel{display:none;flex-direction:column;height:100%;width:100%;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:var(--bg,#f8fafc)}
.draw-panel.open{display:flex}
.draw-tb{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg-card,#fff);border-bottom:1px solid var(--border,#e2e8f0);flex-shrink:0}
.draw-tb-btn{width:32px;height:32px;border:1px solid var(--border,#e2e8f0);border-radius:6px;background:var(--bg-card,#fff);color:var(--text-secondary,#64748b);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.draw-tb-btn:hover{background:var(--bg-hover,#f1f5f9);color:var(--text,#0f172a)}
.draw-tb-btn.active{border-color:#4f46e5;color:#4f46e5;background:#eef2ff}
.draw-tb-sep{width:1px;height:20px;background:var(--border,#e2e8f0);flex-shrink:0}
.draw-tb-color{width:30px;height:30px;padding:2px;border:1px solid var(--border,#e2e8f0);border-radius:6px;background:var(--bg-card,#fff);cursor:pointer}
.draw-tb-lbl{font-size:12px;color:var(--text-secondary,#64748b)}
.draw-tb-rng{width:80px;height:4px;-webkit-appearance:none;appearance:none;background:var(--bg-hover,#f1f5f9);border-radius:2px;outline:none;cursor:pointer}
.draw-tb-rng::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#4f46e5;cursor:pointer}
.draw-tb-num{font-size:12px;color:var(--text-secondary,#64748b);min-width:18px;text-align:center}
.draw-canvas-wrap{flex:1;overflow:hidden;background:#1a1a2e;position:relative}
#draw-canvas{width:100%;height:100%;display:block;cursor:crosshair}
.draw-panel .panel-header{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.draw-panel .panel-header h2{font-size:16px;font-weight:700}
.draw-back-btn{padding:6px 14px;border:1px solid var(--border,#e2e8f0);border-radius:6px;background:var(--bg-card,#fff);cursor:pointer;font-size:13px;color:var(--text-secondary,#64748b);transition:.12s}
.draw-back-btn:hover{border-color:#4f46e5;color:#4f46e5}
.draw-btn-active{background:var(--accent-light,#eef2ff)!important;color:var(--accent,#4f46e5)!important;border-color:var(--accent,#4f46e5)!important}
.draw-panel .panel-actions{display:flex;gap:8px}
.draw-panel .panel-actions button{padding:6px 14px;border:1px solid var(--border,#e2e8f0);border-radius:6px;background:var(--bg-card,#fff);cursor:pointer;font-size:12px;transition:.12s}
.draw-panel .panel-actions button:hover{border-color:#4f46e5}
.draw-panel .panel-actions .primary{background:#4f46e5;color:#fff;border-color:#4f46e5}
/* 镜头绘图按钮 */
.s-hot-btn{position:absolute;right:4px;bottom:4px;width:24px;height:24px;border-radius:4px;border:1px solid var(--border,#e2e8f0);background:rgba(15,15,26,.7);color:#ccc;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity .15s}
.s-cell.s-img:hover .s-hot-btn{opacity:1}
.s-hot-btn:hover{background:#4f46e5;color:#fff;border-color:#4f46e5}
.s-hot-btn.saved{color:#4f46e5;border-color:#4f46e5}
.draw-mode-badge{font-size:12px;color:#64748b;margin-left:12px}
</style>
  </head>
  <body>
    <div id="app"></div>

    <!-- 绘画面板（注入到分镜工具） -->
    <div class="draw-panel" id="drawPanel">
      <div class="panel-header">
        <h2>✏️ 绘画板<span class="draw-mode-badge" id="drawModeBadge"></span></h2>
        <div class="panel-actions">
          <button id="drawSaveShot" class="primary" style="display:none">✓ 保存到镜头</button>
          <button id="drawExport">⬇️ 导出 PNG</button>
        </div>
      </div>
      <div class="draw-tb">
        <button class="draw-tb-btn active" id="drawBrush" title="画笔">✏️</button>
        <button class="draw-tb-btn" id="drawEraser" title="橡皮">🧹</button>
        <span class="draw-tb-sep"></span>
        <input type="color" id="drawColor" value="#ffffff" class="draw-tb-color" title="颜色">
        <span class="draw-tb-sep"></span>
        <label class="draw-tb-lbl">粗细</label>
        <input type="range" id="drawSize" min="1" max="30" value="3" class="draw-tb-rng">
        <span class="draw-tb-num" id="drawSizeVal">3</span>
        <span class="draw-tb-sep"></span>
        <button class="draw-tb-btn" id="drawClear" title="清空">🗑️</button>
        <button class="draw-back-btn" id="drawBack">← 返回分镜</button>
      </div>
      <div class="draw-canvas-wrap">
        <canvas id="draw-canvas"></canvas>
      </div>
    </div>

    <script>
    // ─── 绘画 + 镜头绘图注入 ──────────────────────────
    (function() {
      'use strict';

      // ── DOM 引用 ──
      const drawPanel   = document.getElementById('drawPanel');
      const canvas      = document.getElementById('draw-canvas');
      const appEl       = document.getElementById('app');
      const ctx         = canvas.getContext('2d');

      // ── 绘画状态 ──
      let isDrawing = false, lastX = 0, lastY = 0, tool = 'brush';
      let offscreen = document.createElement('canvas');
      let currentShotId = null;      // 当前正在绘制的镜头 ID
      let currentShotNum = null;     // 镜头编号（显示用）

      // ── Socket.IO（连接分镜 namespace）──
      let fenjingSocket = null;
      let localShots = [];           // shots 本地副本，与服务器同步

      function connectFenjing() {
        if (typeof io === 'undefined') return setTimeout(connectFenjing, 500);
        fenjingSocket = io('/fenjing');

        fenjingSocket.on('connect', () => {
          console.log('[绘画] Socket.IO 已连接到 /fenjing');
        });

        fenjingSocket.on('fenjing:state-sync', (state) => {
          localShots = state.shots || [];
          console.log('[绘画] 收到初始状态，shots:', localShots.length, '首镜ID:', localShots[0]?.id);
        });

        fenjingSocket.on('fenjing:shots-update', (shots) => {
          localShots = shots;
          console.log('[绘画] 收到 shots-update, 数量:', shots.length, '首镜 image:', typeof shots[0]?.image, shots[0]?.image ? '有' : '无');
          // 刷新所有镜头行的绘图按钮状态
          document.querySelectorAll('.shot-row').forEach(refreshShotRow);
        });
      }
      connectFenjing();

      // ── 画布尺寸 ──
      function resizeCanvas() {
        const wrap = canvas.parentElement;
        const rect = wrap.getBoundingClientRect();
        const w = Math.round(rect.width), h = Math.round(rect.height);
        if (canvas.width === w && canvas.height === h) return;
        if (canvas.width > 0 && canvas.height > 0) {
          const tmp = document.createElement('canvas');
          tmp.width = canvas.width; tmp.height = canvas.height;
          tmp.getContext('2d').drawImage(canvas, 0, 0);
          offscreen = tmp;
        }
        canvas.width = w; canvas.height = h;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, w, h);
        if (offscreen.width > 0) ctx.drawImage(offscreen, 0, 0, w, h);
      }

      new ResizeObserver(resizeCanvas).observe(canvas.parentElement);

      // ── 坐标 ──
      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
      }

      function start(e) { e.preventDefault(); isDrawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; }
      function move(e) {
        if (!isDrawing) return; e.preventDefault();
        const p = getPos(e);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (tool === 'eraser') {
          ctx.globalCompositeOperation = 'destination-out';
          ctx.strokeStyle = 'rgba(0,0,0,1)';
          ctx.lineWidth = parseInt(document.getElementById('drawSize').value) * 4;
        } else {
          ctx.globalCompositeOperation = 'source-over';
          ctx.strokeStyle = document.getElementById('drawColor').value;
          ctx.lineWidth = parseInt(document.getElementById('drawSize').value);
        }
        ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
        lastX = p.x; lastY = p.y;
      }
      function stop() { if (!isDrawing) return; isDrawing = false; ctx.globalCompositeOperation = 'source-over'; }

      canvas.addEventListener('mousedown', start);
      canvas.addEventListener('mousemove', move);
      canvas.addEventListener('mouseup', stop);
      canvas.addEventListener('mouseleave', stop);
      canvas.addEventListener('touchstart', start, { passive: false });
      canvas.addEventListener('touchmove', move, { passive: false });
      canvas.addEventListener('touchend', stop);

      // ── 工具绑定 ──
      const brushBtn  = document.getElementById('drawBrush');
      const eraserBtn = document.getElementById('drawEraser');
      brushBtn.addEventListener('click', () => { tool = 'brush'; brushBtn.classList.add('active'); eraserBtn.classList.remove('active'); canvas.style.cursor = 'crosshair'; });
      eraserBtn.addEventListener('click', () => { tool = 'eraser'; eraserBtn.classList.add('active'); brushBtn.classList.remove('active'); canvas.style.cursor = 'cell'; });

      const sizeInput = document.getElementById('drawSize');
      const sizeVal   = document.getElementById('drawSizeVal');
      sizeInput.addEventListener('input', () => { sizeVal.textContent = sizeInput.value; });

      document.getElementById('drawClear').addEventListener('click', () => {
        offscreen.width = 0; offscreen.height = 0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      });

      document.getElementById('drawExport').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = '分镜_' + new Date().toISOString().slice(0, 19).replace(/[:-]/g, '') + '.png';
        link.href = canvas.toDataURL('image/png');
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      });

      window.addEventListener('resize', () => { if (drawPanel.classList.contains('open')) resizeCanvas(); });

      // ── 保存绘画到镜头 ──
      const drawSaveShotBtn = document.getElementById('drawSaveShot');
      drawSaveShotBtn.addEventListener('click', () => {
        if (!currentShotId) { console.warn('[绘画] 保存失败: currentShotId 为空'); return; }
        if (canvas.width === 0 || canvas.height === 0) {
          console.warn('[绘画] 保存失败: 画布未初始化');
          return;
        }
        const dataUrl = canvas.toDataURL('image/png');
        console.log('[绘画] 保存到镜头', currentShotId, '图片大小:', (dataUrl.length / 1024).toFixed(0) + 'KB');
        // 更新本地 shots 副本
        const shot = localShots.find(s => s.id === currentShotId);
        if (shot) {
          shot.image = dataUrl;
          console.log('[绘画] localShots 已更新, 已找到镜头:', shot.number);
          // 通过 Socket.IO 发送更新
          if (fenjingSocket && fenjingSocket.connected) {
            fenjingSocket.emit('fenjing:shots-update', localShots);
            console.log('[绘画] 已发送 fenjing:shots-update');
          } else {
            console.warn('[绘画] 保存失败: fenjingSocket 未连接');
          }
        } else {
          console.warn('[绘画] 保存失败: localShots 中未找到镜头', currentShotId);
        }
        // 关闭绘画面板
        closeDrawPanel();
      });

      // ── 打开/关闭绘画面板 ──
      function openDrawPanel(shotId, shotNum) {
        currentShotId = shotId || null;
        currentShotNum = shotNum || null;

        const badge = document.getElementById('drawModeBadge');
        const saveBtn = document.getElementById('drawSaveShot');
        const drawBack = document.getElementById('drawBack');

        if (shotId) {
          badge.textContent = '→ 镜头 ' + (shotNum || '') + ' 绘图';
          saveBtn.style.display = '';
          // 如果有已有绘图，加载到画布
          const shot = localShots.find(s => s.id === shotId);
          if (shot && shot.image && typeof shot.image === 'string' && shot.image.startsWith('data:')) {
            loadImageToCanvas(shot.image);
          } else {
            // 清空画布
            offscreen.width = 0; offscreen.height = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          }
        } else {
          badge.textContent = '';
          saveBtn.style.display = 'none';
        }

        appEl.style.display = 'none';
        drawPanel.classList.add('open');
        // 更新返回按钮文字
        drawBack.textContent = shotId ? '✕ 取消' : '← 返回分镜';
        setTimeout(resizeCanvas, 100);
      }

      function closeDrawPanel() {
        drawPanel.classList.remove('open');
        appEl.style.display = '';
        document.querySelectorAll('.h-btn.draw-btn-active').forEach(b => b.classList.remove('draw-btn-active'));
        currentShotId = null;
        currentShotNum = null;
      }

      document.getElementById('drawBack').addEventListener('click', closeDrawPanel);

      // ── 加载图片到画布 ──
      function loadImageToCanvas(dataUrl) {
        const img = new Image();
        img.onload = () => {
          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0, 0, w, h);
          ctx.fillStyle = '#1a1a2e';
          ctx.fillRect(0, 0, w, h);
          // 居中绘制，保持比例
          const scale = Math.min(w / img.width, h / img.height) * 0.85;
          const dw = img.width * scale, dh = img.height * scale;
          const dx = (w - dw) / 2, dy = (h - dh) / 2;
          ctx.drawImage(img, dx, dy, dw, dh);
          // 保存到 offscreen 供 resize 使用
          const tmp = document.createElement('canvas');
          tmp.width = w; tmp.height = h;
          tmp.getContext('2d').drawImage(canvas, 0, 0);
          offscreen = tmp;
        };
        img.src = dataUrl;
      }

      // ── 注入镜头绘图按钮 ──
      function injectDrawButton(shotRow) {
        if (shotRow.querySelector('.s-hot-btn')) return; // 已注入

        // 获取镜头 ID — 从 shot-row 的 DOM 结构中无法直接获取，
        // 我们在 .s-cell.s-img 中查找图片组件的引用，然后注入
        const imgCell = shotRow.querySelector('.s-cell.s-img');
        if (!imgCell) return;

        // 让图片单元格 position:relative（若未设）
        if (getComputedStyle(imgCell).position === 'static') {
          imgCell.style.position = 'relative';
        }

        const btn = document.createElement('button');
        btn.className = 's-hot-btn';
        btn.innerHTML = '✏️';
        btn.title = '绘制此镜头画面';
        imgCell.appendChild(btn);

        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          // 从 DOM 中读取镜头编号
          const numCell = shotRow.querySelector('.s-cell.s-num');
          const shotNum = numCell ? parseInt(numCell.textContent.trim()) : null;
          let shot = null;
          if (shotNum) {
            shot = localShots.find(s => s.number === shotNum);
          }
          if (!shot) {
            // 降级：按行索引匹配
            const rows = document.querySelectorAll('.shot-row:not(.new-shot-placeholder)');
            let idx = 0;
            rows.forEach((r, i) => { if (r === shotRow) idx = i; });
            shot = localShots[idx];
          }
          if (!shot) {
            console.warn('[绘画] 未找到对应镜头');
            return;
          }
          openDrawPanel(shot.id, shot.number || shotNum);
        });

        // 刷新状态
        refreshShotRow(shotRow);
      }

      // ── 刷新镜头行图标状态 ──
      function refreshShotRow(shotRow) {
        const btn = shotRow.querySelector('.s-hot-btn');
        if (!btn) return;
        // 从 DOM 中读取镜头编号
        const numCell = shotRow.querySelector('.s-cell.s-num');
        const shotNum = numCell ? parseInt(numCell.textContent.trim()) : null;
        let shot = null;
        if (shotNum) {
          shot = localShots.find(s => s.number === shotNum);
        }
        if (!shot) {
          // 降级：按行索引匹配
          const rows = document.querySelectorAll('.shot-row:not(.new-shot-placeholder)');
          let idx = 0;
          rows.forEach((r, i) => { if (r === shotRow) idx = i; });
          shot = localShots[idx];
        }
        if (!shot) return;
        if (shot.image) {
          btn.classList.add('saved');
          btn.title = '编辑镜头画面';
        } else {
          btn.classList.remove('saved');
          btn.title = '绘制此镜头画面';
        }
      }

      // ── MutationObserver 监听镜头行出现 ──
      const observer = new MutationObserver(() => {
        document.querySelectorAll('.shot-row:not(.new-shot-placeholder)').forEach(injectDrawButton);
      });
      observer.observe(document.getElementById('app') || document.body, {
        childList: true, subtree: true,
      });

      // ── 顶栏绘画按钮（通用绘画、不关联镜头） ──
      function initHeader() {
        const headerRight = document.querySelector('.header .header-right');
        if (!headerRight) return false;

        const drawBtn = document.createElement('button');
        drawBtn.className = 'h-btn';
        drawBtn.innerHTML = '<span>✏️</span><span>绘画</span>';
        drawBtn.title = '自由绘画板（不关联镜头）';
        headerRight.insertBefore(drawBtn, headerRight.firstChild);

        drawBtn.addEventListener('click', () => {
          openDrawPanel(null, null);
          drawBtn.classList.add('draw-btn-active');
        });

        return true;
      }

      // ── 等待 Vue 应用完全加载 ──
      function waitForApp() {
        if (initHeader()) {
          console.log('[绘画] 已注入分镜工具');
        } else {
          setTimeout(waitForApp, 300);
        }
      }
      waitForApp();

      // 初始延迟后尝试一次 injection
      setTimeout(() => {
        document.querySelectorAll('.shot-row:not(.new-shot-placeholder)').forEach(injectDrawButton);
      }, 1000);

    })();
    </script>
  </body>
</html>
